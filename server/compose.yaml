services:
  avatar-server:
    build:
      context: .
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
    volumes:
      - ./runtime/docker-logs:/app/runtime/logs
    restart: unless-stopped
